<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電験二種 電力管理 論説マスター v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --border: #30363d;
  --accent: #e8a838;
  --accent2: #58a6ff;
  --accent3: #3fb950;
  --danger: #f85149;
  --purple: #bc8cff;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --text-bright: #f0f6fc;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── NAV ── */
.topnav {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0;
  position:sticky; top:0; z-index:200;
  overflow-x:auto;
}
.topnav-brand { padding:12px 20px; font-size:13px; font-weight:700; color:var(--accent); white-space:nowrap; border-right:1px solid var(--border); }
.mode-btn {
  padding:14px 18px; font-size:13px; color:var(--text-dim);
  cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent;
  transition:all .2s; background:none; border-left:none; border-right:none; border-top:none;
  font-family:'Noto Sans JP',sans-serif;
}
.mode-btn:hover { color:var(--text-bright); }
.mode-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.nav-right { margin-left:auto; padding:8px 16px; font-size:12px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; white-space:nowrap; }

/* ── PAGES ── */
.page { display:none; }
.page.active { display:block; }

/* ══════════════════════════════
   一覧ページ
══════════════════════════════ */
.overview { padding:24px; max-width:1100px; margin:0 auto; }
.overview-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
  gap:14px; margin-top:20px;
}
.ov-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:16px 18px; cursor:pointer;
  transition:all .2s; position:relative; overflow:hidden;
}
.ov-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 20px rgba(232,168,56,.15); }
.ov-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
}
.ov-card.high::before { background:var(--accent); }
.ov-card.mid::before { background:var(--accent2); }
.ov-card.low::before { background:var(--accent3); }
.ov-card.done-card { opacity:.6; }
.ov-card.done-card::after { content:'✓ 完了'; position:absolute; top:10px; right:12px; font-size:11px; color:var(--accent3); font-weight:700; }
.ov-num { font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; margin-bottom:6px; }
.ov-title { font-size:15px; font-weight:700; color:var(--text-bright); margin-bottom:8px; }
.ov-tags { display:flex; flex-wrap:wrap; gap:5px; }
.ov-tag { font-size:11px; padding:2px 8px; border-radius:4px; background:var(--surface2); color:var(--text-dim); }
.ov-freq { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700; }
.ov-freq.high { background:rgba(232,168,56,.15); color:var(--accent); }
.ov-freq.mid { background:rgba(88,166,255,.15); color:var(--accent2); }
.ov-freq.low { background:rgba(63,185,80,.15); color:var(--accent3); }

/* ══════════════════════════════
   詳細ページ
══════════════════════════════ */
.detail { padding:24px; max-width:900px; margin:0 auto; }
.back-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 12px; border-radius:6px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text-dim); font-size:13px;
  cursor:pointer; margin-bottom:20px; font-family:'Noto Sans JP',sans-serif;
}
.back-btn:hover { color:var(--text-bright); border-color:var(--text-dim); }

.detail-header { margin-bottom:24px; }
.detail-badge { display:inline-block; font-size:11px; padding:3px 10px; border-radius:20px; margin-bottom:8px; font-family:'JetBrains Mono',monospace; }
.detail-badge.high { background:rgba(232,168,56,.15); color:var(--accent); border:1px solid rgba(232,168,56,.3); }
.detail-badge.mid { background:rgba(88,166,255,.15); color:var(--accent2); border:1px solid rgba(88,166,255,.3); }
.detail-badge.low { background:rgba(63,185,80,.15); color:var(--accent3); border:1px solid rgba(63,185,80,.3); }
.detail-title { font-size:24px; font-weight:700; color:var(--text-bright); margin-bottom:6px; }
.detail-meta { font-size:13px; color:var(--text-dim); }

.section-head { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); margin:24px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }

/* 図解ボックス */
.diagram-box {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:20px; margin-bottom:16px; overflow-x:auto;
}
.diagram-box svg { max-width:100%; display:block; margin:0 auto; }

/* 構造フロー */
.flow { display:flex; flex-direction:column; gap:4px; }
.flow-item { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; font-size:14px; }
.flow-num { background:var(--accent); color:#000; font-weight:700; font-size:11px; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
.flow-arrow { text-align:center; color:var(--text-dim); font-size:12px; padding:2px 0; }

/* キーワード */
.kw-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.kw { font-size:12px; padding:5px 12px; border-radius:6px; font-family:'JetBrains Mono',monospace; background:var(--surface); border:1px solid var(--border); color:var(--text); }
.kw.core { border-color:var(--accent); color:var(--accent); background:rgba(232,168,56,.08); }
.kw.sub { border-color:var(--accent2); color:var(--accent2); background:rgba(88,166,255,.08); }

/* 記憶術 */
.memory-box { background:rgba(188,140,255,.08); border:1px solid rgba(188,140,255,.25); border-radius:8px; padding:14px 16px; margin-bottom:16px; font-size:13px; color:var(--purple); }
.memory-box strong { display:block; margin-bottom:4px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; }

/* 模範答案 */
.answer-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:0; }
.ans-tab { padding:8px 16px; font-size:13px; color:var(--text-dim); cursor:pointer; border-bottom:2px solid transparent; background:none; border-left:none; border-right:none; border-top:none; font-family:'Noto Sans JP',sans-serif; }
.ans-tab.active { color:var(--accent2); border-bottom-color:var(--accent2); }
.ans-panel { display:none; }
.ans-panel.active { display:block; }
.answer-box {
  background:var(--bg); border:1px solid var(--border); border-top:none;
  border-radius:0 0 8px 8px; padding:18px; font-size:13px; line-height:2;
  color:var(--text); white-space:pre-wrap;
}
.answer-wrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:16px; }

/* 構成テンプレ */
.template-box { background:var(--surface2); border-left:3px solid var(--accent2); padding:12px 16px; border-radius:0 8px 8px 0; font-size:13px; line-height:1.9; margin-bottom:16px; }

/* 完了ボタン */
.done-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text-dim); font-size:14px; cursor:pointer; transition:all .2s; font-family:'Noto Sans JP',sans-serif; margin-top:8px; }
.done-btn:hover { border-color:var(--accent3); color:var(--accent3); }
.done-btn.done { border-color:var(--accent3); color:var(--accent3); background:rgba(63,185,80,.1); }

/* ══════════════════════════════
   フラッシュカードページ
══════════════════════════════ */
.flashcard-page { padding:24px; max-width:700px; margin:0 auto; }
.fc-controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
.fc-select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:13px; font-family:'Noto Sans JP',sans-serif; }
.fc-btn { padding:8px 16px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all .15s; }
.fc-btn:hover { border-color:var(--accent); color:var(--accent); }
.fc-btn.primary { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }

.card-wrap { perspective:1000px; margin-bottom:20px; }
.fc-card {
  width:100%; min-height:280px; position:relative;
  transform-style:preserve-3d; transition:transform .5s ease;
  cursor:pointer;
}
.fc-card.flipped { transform:rotateY(180deg); }
.fc-face {
  position:absolute; width:100%; min-height:280px;
  backface-visibility:hidden; border-radius:12px;
  display:flex; flex-direction:column; justify-content:center;
  padding:28px; border:1px solid var(--border);
}
.fc-front { background:var(--surface); }
.fc-back { background:var(--surface2); transform:rotateY(180deg); }
.fc-label { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); margin-bottom:12px; }
.fc-question { font-size:18px; font-weight:700; color:var(--text-bright); line-height:1.6; }
.fc-answer { font-size:14px; color:var(--text); line-height:1.9; white-space:pre-wrap; }
.fc-hint { font-size:12px; color:var(--text-dim); margin-top:16px; }
.fc-topic { font-size:12px; color:var(--accent); margin-bottom:8px; font-weight:700; }

.fc-result-btns { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
.fc-ok { padding:10px 28px; border-radius:8px; border:none; background:rgba(63,185,80,.2); color:var(--accent3); font-size:14px; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.fc-ng { padding:10px 28px; border-radius:8px; border:none; background:rgba(248,81,73,.2); color:var(--danger); font-size:14px; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }

.fc-progress-wrap { background:var(--border); border-radius:4px; height:6px; margin-bottom:16px; }
.fc-progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:4px; transition:width .3s; }
.fc-counter { font-size:12px; color:var(--text-dim); text-align:center; margin-bottom:16px; font-family:'JetBrains Mono',monospace; }

.fc-done-screen { text-align:center; padding:40px 20px; }
.fc-done-screen h2 { font-size:24px; color:var(--accent); margin-bottom:12px; }
.fc-score { font-size:48px; font-weight:700; color:var(--text-bright); margin:16px 0; font-family:'JetBrains Mono',monospace; }
.fc-score span { font-size:20px; color:var(--text-dim); }

/* ══════════════════════════════
   進捗ページ
══════════════════════════════ */
.progress-page { padding:24px; max-width:800px; margin:0 auto; }
.prog-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-top:16px; }
.prog-item { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
.prog-item-title { font-size:13px; font-weight:500; color:var(--text-bright); margin-bottom:8px; }
.prog-bar-bg { background:var(--border); border-radius:4px; height:6px; }
.prog-bar-fill { height:100%; border-radius:4px; background:var(--accent3); transition:width .4s; }
.prog-pct { font-size:11px; color:var(--text-dim); margin-top:4px; font-family:'JetBrains Mono',monospace; }

.stat-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:24px; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px 20px; flex:1; min-width:120px; }
.stat-num { font-size:32px; font-weight:700; color:var(--accent); font-family:'JetBrains Mono',monospace; }
.stat-label { font-size:12px; color:var(--text-dim); margin-top:4px; }

/* ── UTILITIES ── */
.notice { background:rgba(88,166,255,.08); border:1px solid rgba(88,166,255,.2); border-radius:6px; padding:12px 16px; font-size:13px; color:var(--accent2); margin-bottom:20px; line-height:1.7; }

@media(max-width:640px){
  .overview-grid { grid-template-columns:1fr; }
  .detail,.overview,.flashcard-page,.progress-page { padding:16px; }
  .fc-question { font-size:15px; }
}

/* ── TOAST ── */
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:#161b22; border:1px solid var(--accent3); color:var(--accent3);
  padding:10px 20px; border-radius:8px; font-size:13px;
  opacity:0; transition:all .25s; z-index:999; white-space:nowrap; pointer-events:none;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── RESET BTN ── */
.reset-btn {
  padding:6px 14px; border-radius:6px; border:1px solid var(--danger);
  background:rgba(248,81,73,.1); color:var(--danger); font-size:12px;
  cursor:pointer; font-family:'Noto Sans JP',sans-serif;
  transition:all .15s; white-space:nowrap;
}
.reset-btn:hover { background:rgba(248,81,73,.2); }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-brand">⚡ 電験二種 論説マスター</div>
  <button class="mode-btn active" onclick="showPage('overview')">一覧</button>
  <button class="mode-btn" onclick="showPage('flashcard')">フラッシュカード</button>
  <button class="mode-btn" onclick="showPage('progress')">進捗</button>
  <div class="nav-right" style="display:flex;align-items:center;gap:12px">
    <span id="navProgress">0/28 完了</span>
    <button class="reset-btn" onclick="resetAllState()">リセット</button>
  </div>
</nav>

<div id="toast"></div>

<!-- ══ 一覧ページ ══ -->
<div class="page active" id="page-overview">
  <div class="overview">
    <div class="notice">電力管理 6問中4問選択。論説は最大2問。★★★を3テーマ完璧にすれば安全圏の土台が作れます。</div>
    <div class="overview-grid" id="ov-grid"></div>
  </div>
</div>

<!-- ══ 詳細ページ ══ -->
<div class="page" id="page-detail">
  <div class="detail" id="detail-content"></div>
</div>

<!-- ══ フラッシュカードページ ══ -->
<div class="page" id="page-flashcard">
  <div class="flashcard-page">
    <div class="fc-controls">
      <select class="fc-select" id="fc-filter">
        <option value="all">全テーマ（84枚）</option>
        <option value="high">★★★ 超頻出のみ</option>
        <option value="mid">★★ 頻出のみ</option>
        <option value="wrong">苦手問題のみ</option>
      </select>
      <button class="fc-btn primary" onclick="startFlash()">▶ スタート</button>
      <button class="fc-btn" onclick="shuffleFlash()">シャッフル</button>
    </div>

    <div id="fc-session" style="display:none">
      <div class="fc-progress-wrap"><div class="fc-progress-fill" id="fc-prog"></div></div>
      <div class="fc-counter" id="fc-counter"></div>
      <div class="card-wrap">
        <div class="fc-card" id="fc-card" onclick="flipCard()">
          <div class="fc-face fc-front">
            <div class="fc-topic" id="fc-topic"></div>
            <div class="fc-label">問題</div>
            <div class="fc-question" id="fc-q"></div>
            <div class="fc-hint">タップして答えを確認</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-label">ポイント答案</div>
            <div class="fc-answer" id="fc-a"></div>
          </div>
        </div>
      </div>
      <div class="fc-result-btns" id="fc-result" style="display:none">
        <button class="fc-ng" onclick="markCard(false)">✗ もう一度</button>
        <button class="fc-ok" onclick="markCard(true)">○ 覚えた</button>
      </div>
    </div>

    <div id="fc-done" style="display:none" class="fc-done-screen">
      <h2>セッション完了</h2>
      <div class="fc-score"><span id="fc-ok-count">0</span><span> / </span><span id="fc-total-count">0</span></div>
      <div style="color:var(--text-dim);font-size:13px;margin-bottom:24px">正解</div>
      <button class="fc-btn primary" onclick="startFlash()">もう一度</button>
      <button class="fc-btn" style="margin-left:8px" onclick="showPage('overview')">一覧へ</button>
    </div>

    <div id="fc-ready">
      <div style="text-align:center;padding:40px 0;color:var(--text-dim)">フィルターを選んで「スタート」を押してください</div>
    </div>
  </div>
</div>

<!-- ══ 進捗ページ ══ -->
<div class="page" id="page-progress">
  <div class="progress-page">
    <div class="stat-row" id="stat-row"></div>
    <div class="section-head" style="margin-top:0">テーマ別習熟度</div>
    <div class="prog-grid" id="prog-grid"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
const topics = [
  {
    id:'t1', freq:'high', cat:'発変電',
    title:'火力発電の熱効率向上',
    tags:['発変電','超頻出','毎年出題'],
    memory:'「蒸気→再熱→コンバイン」の3段ロケットで覚える',
    diagram:`<svg viewBox="0 0 500 160" width="500" height="160" style="font-family:sans-serif">
      <rect x="10" y="60" width="100" height="50" rx="6" fill="#1c2128" stroke="#e8a838" stroke-width="1.5"/>
      <text x="60" y="82" text-anchor="middle" fill="#e8a838" font-size="11" font-weight="bold">高温高圧化</text>
      <text x="60" y="98" text-anchor="middle" fill="#c9d1d9" font-size="10">超臨界圧</text>
      <text x="60" y="112" text-anchor="middle" fill="#8b949e" font-size="10">熱効率45%</text>
      <path d="M112 85 L148 85" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
      <rect x="150" y="60" width="100" height="50" rx="6" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="200" y="82" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">再熱・再生</text>
      <text x="200" y="98" text-anchor="middle" fill="#c9d1d9" font-size="10">サイクル改善</text>
      <text x="200" y="112" text-anchor="middle" fill="#8b949e" font-size="10">湿り度↓効率↑</text>
      <path d="M252 85 L288 85" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr2)"/>
      <rect x="290" y="60" width="110" height="50" rx="6" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
      <text x="345" y="82" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">コンバインド</text>
      <text x="345" y="98" text-anchor="middle" fill="#c9d1d9" font-size="10">排熱二重利用</text>
      <text x="345" y="112" text-anchor="middle" fill="#8b949e" font-size="10">熱効率60%</text>
      <text x="420" y="72" fill="#f85149" font-size="22" font-weight="bold">🔥</text>
      <text x="420" y="100" fill="#8b949e" font-size="10">燃料</text>
      <text x="250" y="30" text-anchor="middle" fill="#f0f6fc" font-size="13" font-weight="bold">熱効率向上の3段階</text>
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/></marker>
        <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/></marker>
      </defs>
    </svg>`,
    flow:[
      {num:'①',text:'蒸気条件の高温高圧化（超臨界圧・超々臨界圧）：熱効率 40〜45% へ'},
      {num:'②',text:'再熱・再生サイクル採用：再加熱で湿り度を下げ、抽気で給水予熱 → 熱損失を減らす'},
      {num:'③',text:'コンバインドサイクル：ガスタービン排ガスで蒸気発生 → 熱効率 50〜60% へ'},
      {num:'④',text:'補機損失低減：送風機・給水ポンプのインバータ制御'},
    ],
    keywords:[
      {word:'熱効率',core:true},{word:'超臨界圧',core:true},{word:'再熱サイクル',core:true},
      {word:'再生サイクル',core:true},{word:'コンバインドサイクル',core:true},

（2）周波数維持対策
・ガバナフリー運転：発電機の調速機が周波数偏差に応じて出力を自動調整する（一次調整）。
・負荷周波数制御（LFC）：中央給電指令所からの信号で発電機出力を調整する（二次調整）。
・経済負荷配分制御（EDC）：燃料費が最小となるよう発電機間の出力配分を決める。
・調整力の確保：揚水発電・蓄電池などの調整電源を待機させる。

（3）再エネ時代の課題
慣性力を持たないインバータ電源の増加により系統の慣性が低下し、周波数変動が大きくなりやすい。蓄電池による疑似慣性付与などの対策が検討されている。`

零相電圧と零相電流の位相関係から地絡の発生方向を判定し、自回線の地絡のみに選択的に動作する。非接地系統において広く採用される。

（3）保護協調
主保護と後備保護の動作時限を整合させ、故障範囲を最小化するよう協調設計を行う。定限時・反限時特性を活用して上位・下位機器間の協調をとる。

（2）電流協調
反限時特性を利用し、事故電流が大きいほど早く動作させる。下位区間の短絡電流に対して下位継電器が先行動作するよう整定する。

主保護が動作しなかった場合に備え、上位の継電器が一定時限後に動作して確実に事故を除去する。

（5）避雷器

// STORAGE
// ══════════════════════════════════════════════════════════
const STORAGE_KEY = 'denken2_master_v2';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      done: state.done,
      wrong: state.wrong,
      savedAt: new Date().toISOString()
    }));
  } catch(e) { console.warn('保存失敗:', e); }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.done)  Object.assign(state.done,  saved.done);
    if (saved.wrong) Object.assign(state.wrong, saved.wrong);
  } catch(e) { console.warn('読込失敗:', e); }
}

function resetAllState() {
  if (!confirm('すべての進捗・苦手記録をリセットしますか？')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state.done  = {};
  state.wrong = {};
  renderOverview();
  updateNavProgress();
  showToast('リセットしました');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.mode-btn').forEach(b => {
    if (b.textContent.includes(name === 'overview' ? '一覧' : name === 'flashcard' ? 'フラッシュ' : '進捗'))
      b.classList.add('active');
  });
  if (name === 'progress') renderProgress();
}

function renderOverview() {
  const grid = document.getElementById('ov-grid');
  grid.innerHTML = topics.map((t, i) => `
    <div class="ov-card ${t.freq} ${state.done[t.id] ? 'done-card' : ''}" onclick="showDetail('${t.id}')">

function switchTab(idx, btn) {
  const wrap = btn.closest('.answer-wrap');
  wrap.querySelectorAll('.ans-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  wrap.querySelectorAll('.ans-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function toggleDone(id, btn) {
  state.done[id] = !state.done[id];
  btn.classList.toggle('done', state.done[id]);
  btn.textContent = state.done[id] ? '✓ 完了済み' : '✓ このテーマを完了にする';
  saveState();
  showToast(state.done[id] ? '✓ 完了として保存しました' : '完了を取り消しました');
  updateNavProgress();
  renderOverview();
}

// FLASHCARD
// ══════════════════════════════════════════════════════════
function buildQueue(filter) {
  let cards = [];
  topics.forEach(t => {
    if (filter === 'high' && t.freq !== 'high') return;
    if (filter === 'mid' && t.freq !== 'mid') return;
    if (filter === 'wrong' && !state.wrong[t.id]) return;
    t.flashcards.forEach(fc => cards.push({...fc, topicTitle: t.title, topicId: t.id}));
  });
  return cards;
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function startFlash() {
  const filter = document.getElementById('fc-filter').value;
  state.fcQueue = shuffle(buildQueue(filter));
  state.fcIndex = 0;
  state.fcOk = 0;
  if (state.fcQueue.length === 0) {
    alert('該当するカードがありません');
    return;
  }
  document.getElementById('fc-ready').style.display = 'none';
  document.getElementById('fc-done').style.display = 'none';
  document.getElementById('fc-session').style.display = 'block';
  renderCard();
}

function shuffleFlash() {
  startFlash();
}

function renderCard() {
  const card = state.fcQueue[state.fcIndex];
  state.fcFlipped = false;
  document.getElementById('fc-card').classList.remove('flipped');
  document.getElementById('fc-result').style.display = 'none';
  document.getElementById('fc-topic').textContent = card.topicTitle;
  document.getElementById('fc-q').textContent = card.q;
  document.getElementById('fc-a').textContent = card.a;
  const pct = (state.fcIndex / state.fcQueue.length * 100).toFixed(0);
  document.getElementById('fc-prog').style.width = pct + '%';
  document.getElementById('fc-counter').textContent = `${state.fcIndex + 1} / ${state.fcQueue.length}`;
}

function flipCard() {
  if (state.fcFlipped) return;
  state.fcFlipped = true;
  document.getElementById('fc-card').classList.add('flipped');
  setTimeout(() => {
    document.getElementById('fc-result').style.display = 'flex';
  }, 300);
}

function markCard(ok) {
  if (ok) {
    state.fcOk++;
  } else {
    const card = state.fcQueue[state.fcIndex];
    state.wrong[card.topicId] = true;
    saveState();
  }
  state.fcIndex++;
  if (state.fcIndex >= state.fcQueue.length) {
    showFcDone();
  } else {
    renderCard();
  }
}

function showFcDone() {
  document.getElementById('fc-session').style.display = 'none';
  document.getElementById('fc-done').style.display = 'block';
  document.getElementById('fc-ok-count').textContent = state.fcOk;
  document.getElementById('fc-total-count').textContent = state.fcQueue.length;
}

// ══════════════════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════════════════
function renderProgress() {
  const doneCount = Object.values(state.done).filter(Boolean).length;
  const wrongCount = Object.values(state.wrong).filter(Boolean).length;
  const totalCards = topics.reduce((s,t) => s + t.flashcards.length, 0);

  document.getElementById('stat-row').innerHTML = `
    <div class="stat-box"><div class="stat-num">${doneCount}</div><div class="stat-label">完了テーマ数</div></div>
    <div class="stat-box"><div class="stat-num">${topics.length}</div><div class="stat-label">総テーマ数</div></div>
    <div class="stat-box"><div class="stat-num">${totalCards}</div><div class="stat-label">総カード枚数</div></div>
    <div class="stat-box"><div class="stat-num">${wrongCount}</div><div class="stat-label">苦手テーマ数</div></div>
  `;

  const byFreq = { high:[], mid:[], low:[] };
  topics.forEach(t => byFreq[t.freq].push(t));

  document.getElementById('prog-grid').innerHTML = topics.map(t => {
    const pct = state.done[t.id] ? 100 : 0;
    return `
      <div class="prog-item">
        <div class="prog-item-title">${t.title}</div>
        <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
        <div class="prog-pct">${state.done[t.id] ? '完了' : '未完了'} ${state.wrong[t.id]?'· 苦手':''}</div>
      </div>
    `;
  }).join('');
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
loadState();
renderOverview();
updateNavProgress();
</script>
